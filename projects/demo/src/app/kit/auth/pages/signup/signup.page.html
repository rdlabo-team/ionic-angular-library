<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/main/kit/auth"></ion-back-button>
    </ion-buttons>
    <ion-title>Sign up</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form novalidate (submit)="$event.preventDefault(); doSignUp()">
    <ion-list>
      <ion-item>
        <ion-input
          data-testid="auth-email"
          type="email"
          inputmode="email"
          label="Email"
          labelPlacement="floating"
          autocomplete="email"
          [formField]="loginForm.email"
          kitAuthInput="email-remember"
        ></ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          data-testid="auth-password"
          type="password"
          label="Password"
          labelPlacement="floating"
          autocomplete="new-password"
          [formField]="loginForm.password"
          kitAuthInput="autofill"
        ></ion-input>
      </ion-item>
    </ion-list>

    <div class="ion-text-center ion-padding-top">
      <ion-button data-testid="auth-signup" type="submit" [disabled]="isLoading() || !loginForm().valid()">
        @if (isLoading()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          Create account
        }
      </ion-button>
    </div>
  </form>
</ion-content>
