name: Lint
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: Cache Angular
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-angular-
      - run: npm ci
      - run: npm run lint
      - run: npm run build
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [ demo, kit, photo-editor, scroll-header, scroll-strategies]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: Cache Angular
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-angular-
      - run: npm ci
      - run: npm run build
      - run: npm run test -- ${{ matrix.project }} --watch=false
  test-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - run: npm ci
      - run: npm run test:actions
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: Cache Angular
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-angular-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-angular-
      - run: npm ci
      - name: Run e2e tests
        run: npm run e2e
        env:
          CI: true
          HOME: /root
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
